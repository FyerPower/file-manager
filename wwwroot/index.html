<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>File Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(to bottom right, #29EAC4, #4284DB);
        }

        #modalOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        #modalOverlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #modal {
            background-color: white;
            border-radius: 0.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 80rem;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <!-- Page Content (Open File Manager Button)-->
    <div class="flex items-center justify-center min-h-screen">
        <button id="btnOpenModal" class="bg-blue-600 text-white px-8 py-4 rounded">📂 Open File Manager</button>
    </div>

    <!-- Modal Overlay -->
    <!-- For testing / quick iteration we're going to default modal open (.active)-->
    <div id="modalOverlay" class="active">
        <!-- Modal Container -->
        <div id="modal">
            <!-- Modal Header with Close Button -->
            <div class="flex items-center justify-between p-4 border-b bg-gray-50">
                <h2 class="text-xl font-semibold">File Manager</h2>
                <button id="btnCloseModal"
                    class="text-gray-600 hover:text-gray-900 text-2xl leading-none">&times;</button>
            </div>

            <!-- Modal Content -->
            <div class="overflow-y-scroll">
                <!-- File Manager -->
                <div class="bg-white">
                    <!-- Controls -->
                    <div class="p-3 border-b flex gap-2 items-center">
                        <input id="search" type="text" placeholder="Search directory..."
                            class="flex-1 border rounded px-3 py-2" />
                        <button id="btnSearch" class="bg-blue-600 text-white px-3 py-2 rounded">🔎 Search</button>
                        <button id="btnNewFolder" class="bg-green-500 text-white px-3 py-2 rounded">📁 Create
                            Folder</button>
                        <button id="btnUploadFile" class="bg-indigo-500 text-white px-3 py-2 rounded">📄 Upload
                            File</button>
                        <button id="btnDuplicate" class="bg-purple-500 text-white px-3 py-2 rounded opacity-30"
                            disabled>📋 Duplicate</button>
                        <button id="btnMove" class="bg-yellow-500 text-white px-3 py-2 rounded opacity-30" disabled>➥
                            Move</button>
                        <button id="btnDelete" class="bg-red-600 text-white px-3 py-2 rounded opacity-30" disabled>🗑
                            Delete</button>
                        <input id="fileInput" type="file" class="hidden" />
                    </div>

                    <!-- File List Wrapper -->
                    <div class="p-4">
                        <div class="mb-3 flex justify">
                            <!-- Navigation (back button / current path) -->
                            <div class="flex items-center gap-3">
                                <button id="btnBack" class="px-2 py-1 border rounded text-sm text-gray-600 opacity-30"
                                    disabled>⮬ Parent</button>
                                <nav class="text-sm text-gray-600 flex items-center gap-2">
                                    Path:
                                    <span id="currentPath" class="flex items-center gap-1"></span>
                                </nav>
                            </div>
                            <div class="ml-auto flex items-center gap-2 text-sm text-gray-600">
                                <div>File(s): <span id="statFileCount">0</span></div>
                                <div>|</div>
                                <div>Folder(s): <span id="statFolderCount">0</span></div>
                                <div>|</div>
                                <div>Total Size: <span id="statTotalSize">0kb</span></div>
                            </div>
                        </div>

                        <!-- File List -->
                        <ul id="fileList" class="grid grid-cols-1 gap-1">
                            <!-- items injected here from the javascript below -->
                        </ul>
                    </div>
                </div>
                <div id="queryTimeResults" class="py-2 text-sm text-gray-700 text-center"></div>
            </div>
        </div>
    </div>
    </div>

    <script src="/scripts/api.js"></script>
    <script src="/scripts/modal.js"></script>
    <script src="/scripts/fileManager.js"></script>
</body>

</html>
